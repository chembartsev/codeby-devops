apiVersion: v1
kind: Pod
metadata:
  name: diagnostic-tool
  namespace: dev
spec:
  serviceAccountName: diagnostic-sa
  containers:
  - name: diagnostic
    image: bitnami/kubectl:latest
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "Начинаю поиск подов Wordpress в namespace dev..."
      pods=$(kubectl get pods -n dev -l app=wordpress -o jsonpath='{.items[*].metadata.name}')
      if [ -z "$pods" ]; then
        echo "Поды Wordpress не найдены"
      else
        echo "Обнаружены следующие поды Wordpress:"
        for pod in $pods; do
          echo "- $pod"
          status=$(kubectl get pod $pod -n dev -o jsonpath='{.status.phase}')
          echo "  Статус: $status"
        done
      fi
      echo "Диагностика завершена"
      sleep 3600
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
  restartPolicy: OnFailure
